# Quarkus Configuration
quarkus.application.name=lingua-backend

# Datasource
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=lingua123
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3307/lingua_db?useUnicode=true&characterEncoding=UTF-8&sessionVariables=character_set_client=utf8mb4,character_set_connection=utf8mb4,character_set_results=utf8mb4&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false

# Flyway - disabled, using manual schema
quarkus.flyway.enabled=false

# Hibernate ORM - create/update tables automatically in dev
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Content-Type,Authorization
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# HTTP Port
quarkus.http.port=8080

# JWT
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=lingua-platform
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=900
smallrye.jwt.new-token.issuer=lingua-platform

# Redis
quarkus.redis.hosts=redis://localhost:6380

# Logging
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
